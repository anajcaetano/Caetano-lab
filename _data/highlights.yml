- title: "Oral Barrier Homeostasis"
  content: "We investigate the molecular and cellular mechanisms by which neuroimmune and neuroepithelial units regulate tissue function in the adult oral mucosa."

- title: "Neural and Glial Diversity"
  content: "We explore how distinct neural and glial populations emerge during development to understand their diverse functions in adult tissues."

- title: "Dysregulation in Disease"
  content: "We study how neuroglial states are corrupted in chronic inflammation and oral cancer, and what this means for disease progression and tissue regeneration. We are particularly interested in how tumour-associated nerves arise."

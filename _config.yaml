title: Caetano Lab
subtitle: Peripheral Glia Biology
description: We study how the peripheral nervous system shapes barrier function in oral tissues.
logo: images/logo.png

nav:
  - title: Research
    url: /research/
  - title: Team
    url: /team/
  - title: Publications
    url: /research/
  - title: Contact
    url: /contact/

email: a.caetano@qmul.ac.uk
github: anajcaetano
bluesky: "@anajcaetano.bsky.social"

remote_theme: greenelab/lab-website-template

plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at

permalink: /:path/

sass:
  sass_dir: _styles
  style: compressed

kramdown:
  parse_block_html: true

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
  - scope:
      path: ""
      type: "members"
    values:
      layout: member

collections:
  members:
    output: true
